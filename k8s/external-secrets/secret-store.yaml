# =============================================================================
# SecretStore — External Secrets Operator integration with HashiCorp Vault
# =============================================================================
# This SecretStore configures ESO to authenticate to Vault using Kubernetes
# auth and pull secrets from the KV v2 secrets engine.
#
# Prerequisites:
#   - External Secrets Operator installed in the cluster
#   - Vault Kubernetes auth method enabled (see scripts/setup-k8s-auth.sh)
#   - vault-auth service account created (see k8s/service-account.yaml)
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-secret-store
  namespace: default
  labels:
    app.kubernetes.io/name: vault-secret-store
    app.kubernetes.io/part-of: vault-secrets-manager
    app.kubernetes.io/managed-by: external-secrets
spec:
  provider:
    vault:
      # Vault server address — update for your environment
      server: "http://vault.vault.svc.cluster.local:8200"

      # Path to the KV v2 secrets engine
      path: "secret"

      # KV v2 engine version
      version: "v2"

      # Kubernetes auth method configuration
      auth:
        kubernetes:
          # Mount path of the Kubernetes auth method in Vault
          mountPath: "kubernetes"

          # Vault role to authenticate as — must match the role created
          # in scripts/setup-k8s-auth.sh
          role: "app-role"

          # Reference to the service account used for authentication
          serviceAccountRef:
            name: "vault-auth"

      # Optional: CA certificate for TLS verification
      # Uncomment and configure for production deployments
      # caProvider:
      #   type: "ConfigMap"
      #   name: "vault-ca"
      #   key: "ca.crt"
