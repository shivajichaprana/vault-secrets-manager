# =============================================================================
# ClusterSecretStore — Cluster-wide Vault integration for External Secrets
# =============================================================================
# Unlike a namespaced SecretStore, a ClusterSecretStore is accessible from any
# namespace. This is ideal for platform teams that manage a central Vault
# instance and want to allow multiple application teams to pull secrets without
# configuring per-namespace SecretStores.
#
# Access control is enforced at two levels:
#   1. Vault policies — restrict which paths each role can read
#   2. K8s RBAC — control which namespaces/service accounts can use this store
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-cluster-store
  labels:
    app.kubernetes.io/name: vault-cluster-store
    app.kubernetes.io/part-of: vault-secrets-manager
    app.kubernetes.io/managed-by: external-secrets
spec:
  # Conditions restrict which namespaces can reference this ClusterSecretStore
  conditions:
    - namespaceSelector:
        matchLabels:
          vault-access: "enabled"

  provider:
    vault:
      # Vault server address
      server: "http://vault.vault.svc.cluster.local:8200"

      # KV v2 secrets engine path
      path: "secret"
      version: "v2"

      # Kubernetes auth configuration
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "cluster-role"

          # For ClusterSecretStore, we reference a service account in a
          # specific namespace since the store itself is cluster-scoped
          serviceAccountRef:
            name: "vault-auth"
            namespace: "vault"

      # Optional: TLS configuration for production
      # caProvider:
      #   type: "ConfigMap"
      #   name: "vault-ca"
      #   namespace: "vault"
      #   key: "ca.crt"

---
# =============================================================================
# Example: ExternalSecret in a different namespace using ClusterSecretStore
# =============================================================================
# Demonstrates cross-namespace secret access via the ClusterSecretStore.
# The namespace must have the label "vault-access: enabled" to be permitted.
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: team-backend
  labels:
    vault-access: "enabled"

---

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets
  namespace: team-backend
  labels:
    app.kubernetes.io/name: backend-secrets
    app.kubernetes.io/part-of: vault-secrets-manager
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: "30m"

  # Reference the ClusterSecretStore instead of a namespaced SecretStore
  secretStoreRef:
    name: vault-cluster-store
    kind: ClusterSecretStore

  target:
    name: backend-api-secrets
    creationPolicy: Owner

  data:
    - secretKey: API_KEY
      remoteRef:
        key: secret/data/team-backend/api
        property: api_key

    - secretKey: API_SECRET
      remoteRef:
        key: secret/data/team-backend/api
        property: api_secret

    - secretKey: JWT_SIGNING_KEY
      remoteRef:
        key: secret/data/team-backend/auth
        property: jwt_signing_key
