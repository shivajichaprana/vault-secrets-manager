# =============================================================================
# ExternalSecret — Syncs a Vault KV secret to a Kubernetes Secret
# =============================================================================
# This ExternalSecret demonstrates how to pull application secrets from Vault
# and create a native Kubernetes Secret that pods can consume via envFrom or
# volume mounts.
#
# The secret is refreshed automatically based on the refreshInterval, ensuring
# rotated secrets propagate to workloads without redeployment.
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-credentials
  namespace: default
  labels:
    app.kubernetes.io/name: app-credentials
    app.kubernetes.io/part-of: vault-secrets-manager
    app.kubernetes.io/managed-by: external-secrets
  annotations:
    # Track which Vault path this secret originates from
    vault.hashicorp.com/secret-path: "secret/data/app/config"
spec:
  # How often to re-fetch the secret from Vault
  # Shorter intervals ensure faster propagation of rotated secrets
  refreshInterval: "1h"

  # Reference to the SecretStore that knows how to talk to Vault
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore

  # Target Kubernetes Secret configuration
  target:
    name: app-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: app-credentials
          app.kubernetes.io/part-of: vault-secrets-manager
      # Optional: template the secret data for custom formatting
      data:
        # Direct mapping of Vault keys
        DB_HOST: "{{ .db_host }}"
        DB_PORT: "{{ .db_port }}"
        DB_USERNAME: "{{ .db_username }}"
        DB_PASSWORD: "{{ .db_password }}"
        # Construct a connection string from individual fields
        DATABASE_URL: "postgresql://{{ .db_username }}:{{ .db_password }}@{{ .db_host }}:{{ .db_port }}/{{ .db_name }}"

  # Data mappings: Vault secret keys → Kubernetes Secret keys
  data:
    - secretKey: db_host
      remoteRef:
        key: secret/data/app/config
        property: db_host

    - secretKey: db_port
      remoteRef:
        key: secret/data/app/config
        property: db_port

    - secretKey: db_username
      remoteRef:
        key: secret/data/app/config
        property: db_username

    - secretKey: db_password
      remoteRef:
        key: secret/data/app/config
        property: db_password

    - secretKey: db_name
      remoteRef:
        key: secret/data/app/config
        property: db_name

---
# =============================================================================
# Example Deployment consuming the synced secret
# =============================================================================
# Shows how a typical application pod references the Kubernetes Secret created
# by the ExternalSecret above.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: default
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/part-of: vault-secrets-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-app
      annotations:
        # Force rolling restart when secret changes (pair with Reloader or
        # stakater/Reloader for automatic restarts on secret rotation)
        vault.hashicorp.com/secret-version: "1"
    spec:
      serviceAccountName: vault-auth
      containers:
        - name: app
          image: alpine:3.19
          command: ["sh", "-c", "echo 'App running with secrets from Vault' && env | grep DB_ && sleep infinity"]
          envFrom:
            - secretRef:
                name: app-credentials
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
