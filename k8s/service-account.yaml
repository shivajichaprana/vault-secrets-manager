# =============================================================================
# Vault Auth Service Account — Used by External Secrets Operator and pods
# =============================================================================
# This service account is bound to a Vault Kubernetes auth role, allowing
# workloads to authenticate to Vault without managing tokens or credentials.
#
# The setup-k8s-auth.sh script configures Vault to trust this service account
# and maps it to the appropriate Vault policies.
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth
  namespace: default
  labels:
    app.kubernetes.io/name: vault-auth
    app.kubernetes.io/part-of: vault-secrets-manager
    app.kubernetes.io/component: auth
  annotations:
    # Document which Vault role this SA authenticates as
    vault.hashicorp.com/role: "app-role"
    vault.hashicorp.com/auth-path: "auth/kubernetes"

---
# =============================================================================
# ClusterRoleBinding — Grants token review access for Vault auth validation
# =============================================================================
# Vault needs to verify the service account tokens presented during K8s auth.
# This binding allows the vault-auth service account to call the TokenReview
# API, which Vault uses to validate incoming authentication requests.
# =============================================================================

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-auth-token-review
  labels:
    app.kubernetes.io/name: vault-auth-token-review
    app.kubernetes.io/part-of: vault-secrets-manager
    app.kubernetes.io/component: auth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault-auth
    namespace: default

---
# =============================================================================
# Vault Auth Service Account for vault namespace (used by ClusterSecretStore)
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-auth
    app.kubernetes.io/part-of: vault-secrets-manager
    app.kubernetes.io/component: auth
  annotations:
    vault.hashicorp.com/role: "cluster-role"
    vault.hashicorp.com/auth-path: "auth/kubernetes"

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-auth-token-review-vault-ns
  labels:
    app.kubernetes.io/name: vault-auth-token-review-vault-ns
    app.kubernetes.io/part-of: vault-secrets-manager
    app.kubernetes.io/component: auth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault-auth
    namespace: vault
